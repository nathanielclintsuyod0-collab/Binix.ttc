<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seraphyx Maintenance Arena</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">⚔ SERAPHYX MAINTENANCE ARENA</div>
<div class="sub">Server under maintenance — sharpen your skills!</div>

<div id="hud">
Score: <span id="score">0</span> |
Coins: <span id="coins">0</span> |
Time: <span id="time">30</span>s |
Power: <span id="power">None</span>
</div>

<div class="buttons">
<button onclick="startGame()">Start</button>
<button onclick="openShop()">Shop</button>
<button onclick="changeSkin()">Skin</button>
</div>

<div id="gameArea"></div>

<script src="script.js"></script>
</body>
</html>
