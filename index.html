<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Binix Paddlers</title>

  <link rel="stylesheet" href="style.css">

  <script type="module" src="app.js" defer></script>

</head>

<body>

  <div class="background-glow glow1"></div>
  <div class="background-glow glow2"></div>

  <header>

    <div class="logo-section">

      <h1>🏓 BINIX PADDLERS</h1>

      <p>
        Official Table Tennis Rankings
      </p>

    </div>

  </header>

  <main>

    <section class="hero-card fade-up">

      <div>

        <h2>
          🏆 Top Ranked Player
        </h2>

        <div id="topPlayer"></div>

      </div>

    </section>

    <section class="card fade-up">

      <div class="section-header">

        <h2>➕ Record Match</h2>

      </div>

      <div class="match-controls">

        <select id="winner"></select>

        <span class="vs-text">VS</span>

        <select id="loser"></select>

        <button id="submitMatch">
          Submit Match
        </button>

      </div>

    </section>

    <section class="card fade-up">

      <div class="section-header">

        <h2>👤 Add Players</h2>

      </div>

      <div class="player-controls">

        <input
          type="text"
          id="newPlayer"
          placeholder="Enter Player Name"
        >

        <button id="addPlayer">
          Add Player
        </button>

      </div>

    </section>

    <section class="card fade-up">

      <div class="section-header">

        <h2>📊 Rankings</h2>

      </div>

      <div class="table-wrapper">

        <table>

          <thead>

            <tr>

              <th>#</th>
              <th>Player</th>
              <th>Points</th>
              <th>Wins</th>
              <th>Losses</th>
              <th>Streak</th>

            </tr>

          </thead>

          <tbody id="leaderboard"></tbody>

        </table>

      </div>

    </section>

    <section class="card fade-up">

      <div class="section-header">

        <h2>📝 Match History</h2>

      </div>

      <div id="history"></div>

    </section>

  </main>

</body>

</html>

</body>
</html>
