<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seraphyx Arena</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen">
    <h1>⚔ SERAPHYX ARENA</h1>
    <p>Maintenance Training Simulation</p>

    <button onclick="Game.start()">Play</button>
    <button onclick="Shop.open()">Shop</button>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
    Score: <span id="score">0</span> |
    Coins: <span id="coins">0</span> |
    Time: <span id="time">30</span>
</div>

<!-- GAME -->
<div id="gameArea" class="hidden"></div>

<!-- SHOP -->
<div id="shop" class="hidden">
    <h2>Seraphyx Armory</h2>
    <div id="shopItems"></div>
    <button onclick="Shop.close()">Close</button>
</div>

<script src="app.js"></script>

</body>
</html>
